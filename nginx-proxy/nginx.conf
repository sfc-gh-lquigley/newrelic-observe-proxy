events {
    worker_connections 4096;
}

http {
    # Logging format that captures NewRelic payloads
    log_format newrelic_spans escape=json
        '{'
        '"timestamp":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"body_bytes":$body_bytes_sent,'
        '"request_body":"$request_body"'
        '}';

    # Upstream to Observe HTTP ingest
    upstream observe {
        server ${OBSERVE_ENDPOINT_HOST}:443;
    }

    # Server configuration for NewRelic agent connections
    server {
        listen 443 ssl http2;
        server_name collector.newrelic.com newrelic-proxy;

        # SSL configuration
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Allow large request bodies (NewRelic sends batches of spans)
        client_max_body_size 10M;
        client_body_buffer_size 10M;

        # Log all NewRelic payloads
        access_log /var/log/nginx/newrelic-spans.jsonl newrelic_spans;
        error_log /var/log/nginx/error.log warn;

        # NewRelic agent listener endpoint
        location /agent_listener/invoke_raw_method {
            # Parse query parameters
            set $method_name $arg_method;
            set $license_key $arg_license_key;

            # Handle agent connect handshake - return full NewRelic response
            # Note: Includes request_headers_map, event_harvest_config and other required fields
            if ($method_name = 'connect') {
                add_header Content-Type application/json;
                return 200 '{"return_value": {"agent_run_id": "mock-run-id-12345", "request_headers_map": {}, "max_payload_size_in_bytes": 1000000, "product_level": 50, "collect_traces": true, "collect_errors": true, "collect_analytics_events": true, "collect_span_events": true, "collect_error_events": true, "data_report_period": 60, "sampling_target": 10, "sampling_target_period_in_seconds": 60, "apdex_t": 0.5, "messages": [], "event_harvest_config": {"report_period_ms": 60000, "harvest_limits": {"analytic_event_data": 10000, "custom_event_data": 10000, "error_event_data": 100, "span_event_data": 2000}}}}';
            }
            
            # Handle preconnect method
            # Note: Empty redirect_host means no redirection (stay on current host)
            if ($method_name = 'preconnect') {
                add_header Content-Type application/json;
                return 200 '{"return_value": {"redirect_host": "", "security_policies": {"record_sql": {"enabled": true}, "attributes_include": {"enabled": true}, "allow_raw_exception_messages": {"enabled": true}, "custom_events": {"enabled": true}, "custom_parameters": {"enabled": true}}}}';
            }

            # Handle other methods (analytic_event_data, span_event_data, etc.)
            # Forward to Observe HTTP ingest
            proxy_pass https://observe;
            proxy_ssl_verify off;  # For testing only - enable in production
            proxy_set_header Content-Type application/json;
            proxy_set_header Authorization "Bearer ${OBSERVE_TOKEN}";
            proxy_set_header X-Forwarded-For $remote_addr;
            
            # If Observe returns error, still return success to agent
            # (prevents agent from retrying endlessly)
            proxy_intercept_errors on;
            error_page 500 502 503 504 = @observe_error;
            
            # Return success to agent after forwarding
            add_header Content-Type application/json;
            return 200 '{"return_value": null}';
        }

        # Handle Observe errors gracefully
        location @observe_error {
            add_header Content-Type application/json;
            return 200 '{"return_value": null}';
        }

        # Health check endpoint
        location /health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 'OK';
        }

        # Root endpoint
        location / {
            add_header Content-Type text/plain;
            return 200 'NewRelic Observe Proxy\n';
        }
    }
}
